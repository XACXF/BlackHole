name: Build XAC VST3

on:
  push:
    paths:
      - 'VST/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-vst.yml'
  workflow_dispatch:

jobs:
  build-vst:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Unix Makefiles)
        run: |
          cmake -B build -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build --target help 2>&1 | head -30

      - name: Build XAClive
        run: cmake --build build --target XAClive --config Release -- -j2 2>&1 | tail -5

      - name: Build XACmusic
        run: cmake --build build --target XACmusic --config Release -- -j2 2>&1 | tail -5

      - name: Find and stage VST3, then package
        run: |
          set -e
          mkdir -p stage/Library/Audio/Plug-Ins/VST3 dist

          XACLIVE_VST3=
          XACMUSIC_VST3=

          echo "XAClive.vst3 found at: " + 
          echo "XACmusic.vst3 found at: " + 

          if [ -z "" ] || [ -z "" ]; then
            echo "ERROR: VST3 files not found!"
            exit 1
          fi

          cp -R "" stage/Library/Audio/Plug-Ins/VST3/
          cp -R "" stage/Library/Audio/Plug-Ins/VST3/
          ls -la stage/Library/Audio/Plug-Ins/VST3/

          pkgbuild --root stage \
            --identifier audio.xac.XACVST \
            --version 1.0.0 \
            --install-location / \
            dist/XACVST.pkg

          echo "Package built:"
          ls -lh dist/XACVST.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XACVST-pkg
          path: dist/XACVST.pkg