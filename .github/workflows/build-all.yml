name: Build XAC Audio Suite (Combined)

on:
  push:
    branches: [master, main]
    paths:
      - 'VST/**'
      - 'CMakeLists.txt'
      - 'BlackHole/**'
      - 'Scripts/**'
      - '.github/workflows/build-all.yml'
  workflow_dispatch:

jobs:
  build-suite:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build XACmusic driver
        env:
          DRIVER_NAME: 'XAC music'
          BUNDLE_ID: audio.xac.XACmusic
          CHANNELS: "2"
          PKG_NAME: XACmusic
        run: |
          set -e
          git checkout -- BlackHole/BlackHole.c 2>/dev/null || true
          bash Scripts/build-xacmusic.sh
          mkdir -p drivers/HAL
          cp -R "build/Symbols/Release/XAC music 2ch.driver" drivers/HAL/
          git checkout -- BlackHole/BlackHole.c

      - name: Build XACliv driver
        env:
          DRIVER_NAME: 'XAC live'
          BUNDLE_ID: audio.xac.XAClive
          CHANNELS: "2"
          PKG_NAME: XAClive
        run: |
          set -e
          git checkout -- BlackHole/BlackHole.c 2>/dev/null || true
          bash Scripts/build-xacliv.sh
          mkdir -p drivers/HAL
          cp -R "build/Symbols/Release/XAC live 2ch.driver" drivers/HAL/
          git checkout -- BlackHole/BlackHole.c

      - name: Configure VST3+AU Unix Makefiles
        run: |
          set -e
          rm -rf build
          cmake -B build -S . -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build VST3+AU capture full log
        run: |
          set -o pipefail
          cmake --build build --config Release -- -j2 2>&1 | tee /tmp/build.log

      - name: Stage and package combined (VST3 + AU + drivers)
        if: success()
        run: |
          set -e
          mkdir -p stage/Library/Audio/Plug-Ins/HAL stage/Library/Audio/Plug-Ins/VST3 stage/Library/Audio/Plug-Ins/Components dist scripts

          # Copy drivers (HAL)
          cp -R "drivers/HAL/XAC music 2ch.driver" stage/Library/Audio/Plug-Ins/HAL/
          cp -R "drivers/HAL/XAC live 2ch.driver" stage/Library/Audio/Plug-Ins/HAL/

          # Find VST3 bundles
          XACMUSIC_VST3=$(find build -name "XAC music.vst3" -type d 2>/dev/null | head -1)
          XACLIVE_VST3=$(find build -name "XAC live.vst3" -type d 2>/dev/null | head -1)
          echo "XACmusic VST3: $XACMUSIC_VST3"
          echo "XAClive VST3: $XACLIVE_VST3"
          [ -z "$XACMUSIC_VST3" ] && { echo "ERROR: XAC music.vst3 not found"; exit 1; }
          [ -z "$XACLIVE_VST3" ] && { echo "ERROR: XAC live.vst3 not found"; exit 1; }
          cp -R "$XACMUSIC_VST3" stage/Library/Audio/Plug-Ins/VST3/
          cp -R "$XACLIVE_VST3" stage/Library/Audio/Plug-Ins/VST3/

          # Find AU component bundles
          XACMUSIC_AU=$(find build -name "XAC music.component" -type d 2>/dev/null | head -1)
          XACLIVE_AU=$(find build -name "XAC live.component" -type d 2>/dev/null | head -1)
          echo "XACmusic AU: $XACMUSIC_AU"
          echo "XAClive AU: $XACLIVE_AU"
          if [ -n "$XACMUSIC_AU" ]; then
            cp -R "$XACMUSIC_AU" stage/Library/Audio/Plug-Ins/Components/
          else
            echo "WARNING: XAC music.component not found (AU may not have built)"
          fi
          if [ -n "$XACLIVE_AU" ]; then
            cp -R "$XACLIVE_AU" stage/Library/Audio/Plug-Ins/Components/
          else
            echo "WARNING: XAC live.component not found (AU may not have built)"
          fi

          # Postinstall script
          printf '#!/bin/bash\nkillall -9 coreaudiod 2>/dev/null || true\nexit 0\n' > scripts/postinstall
          chmod +x scripts/postinstall

          # Build combined pkg
          pkgbuild --root stage --identifier audio.xac.XACAudio --version 1.0.0 --install-location / --scripts scripts dist/XACAudio.pkg
          ls -lh dist/XACAudio.pkg

      - name: Upload build logs always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build.log

      - name: Upload combined pkg
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: XACAudio-pkg
          path: dist/XACAudio.pkg