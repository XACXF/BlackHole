name: Build XAC Audio Drivers

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-xacmusic:
    runs-on: macos-latest
    timeout-minutes: 30
    
    env:
      DRIVER_NAME: XACmusic
      BUNDLE_ID: audio.xac.XACmusic
      DEVICE_NAME: XACmusic
      CHANNELS: "2"
      PKG_NAME: XACmusic
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build XACmusic Driver
        run: bash Scripts/build-xacmusic.sh

      - name: Upload XACmusic dmg
        uses: actions/upload-artifact@v4
        with:
          name: XACmusic-dmg
          path: dist/XACmusic.dmg
          retention-days: 30

  build-xacliv:
    runs-on: macos-latest
    timeout-minutes: 30
    
    env:
      DRIVER_NAME: XACliv
      BUNDLE_ID: audio.xac.XACliv
      DEVICE_NAME: XACliv
      CHANNELS: "2"
      PKG_NAME: XACliv
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build XACliv Driver
        run: bash Scripts/build-xacliv.sh

      - name: Upload XACliv dmg
        uses: actions/upload-artifact@v4
        with:
          name: XACliv-dmg
          path: dist/XACliv.dmg
          retention-days: 30